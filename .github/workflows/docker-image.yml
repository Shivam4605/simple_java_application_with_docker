name: Docker CI Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USER }}/spring_app:latest .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USER }}/spring_app:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USER }}/spring_app:latest
            docker stop spring_app || true
            docker rm spring_app || true
            docker run -d -p 8080:8080 --name spring_app ${{ secrets.DOCKER_USER }}/spring_app:latest
